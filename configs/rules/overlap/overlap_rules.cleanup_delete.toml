# Overlap cleanup pass 2 (destructive).
# Deletes duplicate rows previously reviewed in pass 1.
#
# Usage example:
#   pleb workflow --file configs/workflows/tim_cleanup_two_pass.toml

[[rules]]
name = "wsrt_p2_prefer_dual_channel_delete"
enabled = true
kind = "prefer_multichannel"
primary_glob = "WSRT.P2.*.tim"
secondary_glob = "WSRT.P2.*_2.tim"
mjd_tol_sec = 9.9e-7
action = "delete"
comment_prefix = "C CLEANUP_PASS2_PREFER_DUAL"

