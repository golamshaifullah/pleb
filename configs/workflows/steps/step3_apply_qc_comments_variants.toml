# Step 3: apply QC outlier comments (non-destructive) on top of Step 2 branch.
# Reads QC CSVs produced by Step 2 run directory and commits to a new branch.

home_dir = "/work/git_projects/epta-dr3-in2p3"
dataset_name = "EPTA-DR3/epta-dr3-data"
results_dir = "results"
singularity_image = "/work/git_projects/PSR_Singularity/psrpta.sif"

branches = ["step3_apply_qc_comments_variants"]
reference_branch = "step3_apply_qc_comments_variants"
pulsars = "ALL"
jobs = 10
outdir_name = "wf_step3_apply_qc_comments_variants"

run_tempo2 = false
run_pqc = false
qc_report = false
make_plots = false
make_reports = false
make_covmat = false

run_fix_dataset = true
fix_apply = true
fix_base_branch = "step2_pqc_balanced_detect"  # override in workflow if needed
fix_branch_name = "step3_apply_qc_comments_variants"
fix_commit_message = "FixDataset: apply balanced PQC comments (non-destructive)"

# Must point to Step 2 QC outputs.
fix_qc_results_dir = "results/wf_step2_pqc_balanced_detect/qc"
fix_qc_branch = "step2_pqc_balanced_detect"

# Comment-only policy => no TOA loss.
fix_qc_remove_outliers = true
fix_qc_action = "comment"
fix_qc_outlier_cols = ["bad_point", "robust_outlier", "robust_global_outlier", "bad_mad"]
fix_qc_remove_bad = true
fix_qc_remove_transients = false
fix_qc_remove_solar = false
fix_qc_remove_orbital_phase = false

# Regenerate variants on final branch.
fix_generate_alltim_variants = true
fix_backend_classifications_path = "/work/git_projects/pleb/configs/catalogs/variants/backend_classifications_legacy_new.toml"
fix_alltim_variants_path = "/work/git_projects/pleb/configs/catalogs/variants/alltim_variants_legacy_new.toml"
fix_jump_reference_variants = true
fix_jump_reference_jump_flag = "-sys"
fix_jump_reference_keep_tmp = false
fix_jump_reference_csv_dir = "results/jump_reference"
