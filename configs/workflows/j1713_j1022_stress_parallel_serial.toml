# Two-stage stress workflow with serial stage barriers and parallel work inside each stage.
#
# Stage 1:
#   - run full stress detection for J1713+0747 and J1022+1001
#   - generate variant _all.tim and variant .par files
#   - commit into a feature branch
#
# Stage 2:
#   - start from Stage-1 branch
#   - apply QC outlier comments only
#   - commit into a second branch

config = "configs/runs/fixdataset/fixdataset_jump_reference_variants_J1713_J1022.toml"

# Global mode for top-level groups.
mode = "serial"

[[groups]]
name = "stage1_detect_and_build_variants"
mode = "serial"

[[groups.steps]]
name = "pipeline"

[groups.steps.overrides]
outdir_name = "run_j1713_j1022_stress_features"
pulsars = ["J1713+0747", "J1022+1001"]
jobs = 2
run_pqc = true
qc_report = true
run_fix_dataset = true
fix_apply = true
fix_base_branch = "main"
fix_branch_name = "stress_j1713_j1022_features"
fix_commit_message = "FixDataset: J1713+J1022 stress feature detection + variants"
fix_qc_remove_outliers = false
fix_qc_remove_bad = false
fix_qc_remove_transients = false
fix_qc_remove_solar = false
fix_qc_remove_orbital_phase = false

[[groups]]
name = "stage2_apply_outlier_comments"
mode = "serial"

[[groups.steps]]
name = "fix_apply"

[groups.steps.overrides]
# Reuse PQC output from stage 1, then apply only outlier comments.
outdir_name = "run_j1713_j1022_apply_comments"
pulsars = ["J1713+0747", "J1022+1001"]
jobs = 2
run_pqc = false
run_tempo2 = false
make_plots = false
make_reports = false
make_covmat = false
qc_report = false
run_fix_dataset = true
fix_apply = true
fix_base_branch = "stress_j1713_j1022_features"
fix_branch_name = "stress_j1713_j1022_outliers_comment"
fix_commit_message = "FixDataset: apply PQC outlier comments for J1713+J1022"
fix_qc_results_dir = "/tmp/epta_2psr_new/results/run_j1713_j1022_stress_features/qc"
fix_qc_branch = "main"
fix_qc_remove_outliers = true
fix_qc_action = "comment"
fix_qc_remove_bad = true
fix_qc_remove_transients = false
fix_qc_remove_solar = false
fix_qc_remove_orbital_phase = false

# Keep other fix actions disabled for comment-only pass.
fix_update_alltim_includes = false
fix_infer_system_flags = false
fix_insert_missing_jumps = false
fix_prune_stale_jumps = false
fix_dedupe_toas_within_tim = false
fix_check_duplicate_backend_tims = false
fix_remove_overlaps_exact = false
fix_generate_alltim_variants = false
fix_jump_reference_variants = false
