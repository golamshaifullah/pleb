# Companion workflow: J1713 stress-test with broad PQC feature detection,
# then a second pass that applies only PQC outlier comments.
#
# Base config already targets one pulsar (J1713+0747):
#   configs/runs/fixdataset/fixdataset_jump_reference_variants_J1713.toml
#
# Run:
#   pleb workflow --file configs/workflows/j1713_stress_feature_hunt.toml
# Optional:
#   --set home_dir="/tmp/epta_1713_new"
#   --set fix_qc_results_dir="/tmp/epta_1713_new/results/run_j1713_stress_features/qc"

config = "configs/runs/fixdataset/fixdataset_jump_reference_variants_J1713.toml"

[[steps]]
name = "pipeline"

[steps.overrides]
outdir_name = "run_j1713_stress_features"
run_pqc = true
qc_report = true
run_fix_dataset = true
fix_apply = true
fix_base_branch = "main"
fix_branch_name = "stress_j1713_features"
fix_commit_message = "FixDataset: J1713 stress feature detection"
fix_qc_remove_outliers = false
fix_qc_remove_bad = false
fix_qc_remove_transients = false
fix_qc_remove_solar = false
fix_qc_remove_orbital_phase = false

[[steps]]
name = "fix_apply"

[steps.overrides]
# Reuse PQC output from step 1, then apply only outlier comments.
run_pqc = false
run_tempo2 = false
make_plots = false
make_reports = false
make_covmat = false
qc_report = false
run_fix_dataset = true
fix_apply = true
fix_base_branch = "stress_j1713_features"
fix_branch_name = "stress_j1713_outliers_comment"
fix_commit_message = "FixDataset: apply PQC outlier comments for J1713"
fix_qc_results_dir = "/tmp/epta_1713_new/results/run_j1713_stress_features/qc"
fix_qc_branch = "main"
fix_qc_remove_outliers = true
fix_qc_action = "comment"
fix_qc_remove_bad = true
fix_qc_remove_transients = false
fix_qc_remove_solar = false
fix_qc_remove_orbital_phase = false
