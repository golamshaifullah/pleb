[run]
mode = "pipeline"
run_tempo2 = true
run_fix_dataset = true
run_pqc = true
qc_report = true
run_whitenoise = true

[data]
jobs = 6

[policy.fix]
apply = true
qc_action = "comment"
qc_remove_outliers = true
qc_outlier_cols = ["bad_point", "robust_outlier", "robust_global_outlier", "bad_mad"]
qc_remove_bad = true
qc_remove_transients = false
qc_remove_solar = false
qc_remove_orbital_phase = false

[policy.pqc]
backend_col = "sys"
merge_tol_seconds = 1.0
robust_enabled = true
robust_scope = "backend"
robust_z_thresh = 6.0

[policy.whitenoise]
single_toa_mode = "combined"
fit_timing_model_first = true
