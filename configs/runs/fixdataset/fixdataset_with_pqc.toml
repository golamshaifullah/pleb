# Same base config as pqc_only.toml, plus one extra step:
# apply FixDataset to comment QC outliers (no other fix actions).

home_dir = "/work/git_projects/epta-dr3-in2p3"
dataset_name = "EPTA-DR3/epta-dr3-data"
results_dir = "results"
singularity_image = "/work/git_projects/PSR_Singularity/psrpta.sif"

branches = ["fix_dataset_discover_jumps_variants"]
reference_branch = "fix_dataset_discover_jumps_variants"
pulsars = "ALL"
jobs = 12

run_tempo2 = false
make_plots = false
make_reports = false
make_covmat = false

run_pqc = true
qc_report = true

# Keep PQC settings identical to pqc_only.toml
pqc_backend_col = "sys"
pqc_drop_unmatched = false
pqc_merge_tol_seconds = 10.0
pqc_structure_mode = "both"
pqc_structure_detrend_features = ["solar_elongation_deg", "orbital_phase", "freq_bin"]
pqc_structure_test_features = ["solar_elongation_deg", "orbital_phase", "freq_bin"]
pqc_structure_group_cols = "sys"
pqc_add_freq_bin = true
pqc_freq_bins = 20
pqc_robust_scope = "backend"
pqc_robust_z_thresh = 6.0
pqc_add_orbital_phase = true
pqc_add_solar_elongation = true
pqc_add_elevation = true
pqc_add_airmass = true
pqc_add_parallactic_angle = true
pqc_step_enabled = true
pqc_dm_step_enabled = true
pqc_solar_events_enabled = true
pqc_eclipse_events_enabled = true
pqc_gaussian_bump_enabled = true
pqc_glitch_enabled = true

qc_report_backend_col = "sys"

# Extra step vs pqc_only: apply only QC outlier comments.
run_fix_dataset = true
fix_apply = true
fix_branch_name = "fixdataset_comment_outliers"
fix_base_branch = "fix_dataset_discover_jumps_variants"
fix_commit_message = "FixDataset: comment PQC outliers"

# Disable all other fix actions.
fix_update_alltim_includes = false
fix_infer_system_flags = false
fix_insert_missing_jumps = false
fix_prune_stale_jumps = false
fix_dedupe_toas_within_tim = false
fix_check_duplicate_backend_tims = false
fix_remove_overlaps_exact = false
fix_generate_alltim_variants = false

# Enable only QC outlier application.
fix_qc_remove_outliers = true
fix_qc_action = "comment"
fix_qc_backend_col = "sys"
fix_qc_remove_bad = true
fix_qc_remove_transients = false
fix_qc_remove_solar = false
fix_qc_remove_orbital_phase = false
