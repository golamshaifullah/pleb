# Stress profile: two-pulsar (J1713+0747 + J1022+1001) run that exercises
# FixDataset variant generation + jump-reference builder + broad PQC feature scans.
#
# Note: keep dataset_name aligned with home_dir. If you override home_dir on CLI,
# also override dataset_name to the same absolute path.

home_dir = "/tmp/epta_2psr_new"
dataset_name = "/tmp/epta_2psr_new"
results_dir = "results"
singularity_image = "/work/git_projects/PSR_Singularity/psrpta.sif"

branches = ["main"]
reference_branch = "main"
pulsars = ["J1713+0747", "J1022+1001"]
jobs = 2

run_tempo2 = true
make_plots = true
make_reports = true
make_covmat = true
run_pqc = true
qc_report = true
qc_report_backend_col = "sys"
qc_report_dir = "/tmp/epta_2psr_new/results/qc_report"
qc_report_compact_pdf = true
qc_report_compact_pdf_name = "J1713_J1022_qc_compact_report.pdf"

run_fix_dataset = true
fix_apply = true
fix_base_branch = "main"
fix_branch_name = "stress_j1713_j1022_features"
fix_commit_message = "FixDataset: J1713+J1022 stress profile (variants+jump-reference+pqc feature hunt)"

fix_generate_alltim_variants = true
fix_backend_classifications_path = "/work/git_projects/pleb/configs/catalogs/variants/backend_classifications_legacy_new.toml"
fix_alltim_variants_path = "/work/git_projects/pleb/configs/catalogs/variants/alltim_variants_legacy_new.toml"

fix_jump_reference_variants = true
fix_jump_reference_jump_flag = "-sys"
fix_jump_reference_keep_tmp = false
fix_jump_reference_csv_dir = "results/jump_reference"

# Keep PQC outputs diagnostic-only in this stress profile (no auto TOA commenting/deletion).
fix_qc_remove_outliers = false
fix_qc_remove_bad = false
fix_qc_remove_transients = false
fix_qc_remove_solar = false
fix_qc_remove_orbital_phase = false

# -----------------------------
# PQC stress knobs (feature-hunt style)
# -----------------------------
pqc_backend_col = "sys"
pqc_backend_profiles_path = "/work/git_projects/pleb/configs/rules/pqc/backend_profiles.example.toml"
pqc_drop_unmatched = false
pqc_merge_tol_seconds = 10.0

# Broad feature engineering
pqc_add_orbital_phase = true
pqc_add_solar_elongation = true
pqc_add_elevation = true
pqc_add_airmass = true
pqc_add_parallactic_angle = true
pqc_add_freq_bin = true
pqc_freq_bins = 24
pqc_observatory_path = "/work/mambaforge/envs/pta_pipeline/observatory/observatories.dat"

# Structure diagnostics
pqc_structure_mode = "both"
pqc_structure_detrend_features = ["solar_elongation_deg", "orbital_phase", "freq_bin", "airmass", "elevation_deg"]
pqc_structure_test_features = ["solar_elongation_deg", "orbital_phase", "freq_bin", "airmass", "elevation_deg"]
pqc_structure_group_cols = "sys"
pqc_structure_nbins = 16
pqc_structure_min_per_bin = 3
pqc_structure_p_thresh = 0.02

# Robust outliers + event instrumentation
pqc_robust_enabled = true
pqc_robust_scope = "backend"
pqc_robust_z_thresh = 5.0
pqc_outlier_gate_enabled = false
pqc_event_instrument = true

# Generic transient scan (sensitive)
pqc_tau_corr_minutes = 30.0
pqc_fdr_q = 0.02
pqc_mark_only_worst_per_day = false
pqc_tau_rec_days = 5.0
pqc_window_mult = 4.0
pqc_min_points = 5
pqc_delta_chi2_thresh = 16.0
pqc_exp_dip_min_duration_days = 7.0

# Step/DM-step
pqc_step_enabled = true
pqc_step_min_points = 10
pqc_step_delta_chi2_thresh = 12.0
pqc_step_scope = "both"

pqc_dm_step_enabled = true
pqc_dm_step_min_points = 10
pqc_dm_step_delta_chi2_thresh = 12.0
pqc_dm_step_scope = "both"

# Solar / orbital / eclipse event finders
pqc_solar_events_enabled = true
pqc_solar_approach_max_deg = 35.0
pqc_solar_min_points_global = 20
pqc_solar_min_points_year = 6
pqc_solar_min_points_near_zero = 3
pqc_solar_tau_min_deg = 1.5
pqc_solar_tau_max_deg = 70.0
pqc_solar_member_eta = 0.8
pqc_solar_freq_dependence = true

pqc_orbital_phase_cut_enabled = true
pqc_orbital_phase_cut_center = 0.25
pqc_orbital_phase_cut = ""
pqc_orbital_phase_cut_sigma = 2.5
pqc_orbital_phase_cut_nbins = 20
pqc_orbital_phase_cut_min_points = 16

pqc_eclipse_events_enabled = true
pqc_eclipse_center_phase = 0.25
pqc_eclipse_min_points = 20
pqc_eclipse_width_min = 0.01
pqc_eclipse_width_max = 0.5
pqc_eclipse_member_eta = 0.8
pqc_eclipse_freq_dependence = true

# Gaussian bump / glitch event finders
pqc_gaussian_bump_enabled = true
pqc_gaussian_bump_min_duration_days = 20.0
pqc_gaussian_bump_max_duration_days = 2000.0
pqc_gaussian_bump_n_durations = 10
pqc_gaussian_bump_min_points = 10
pqc_gaussian_bump_delta_chi2_thresh = 14.0
pqc_gaussian_bump_suppress_overlap = false
pqc_gaussian_bump_member_eta = 0.8
pqc_gaussian_bump_freq_dependence = true

pqc_glitch_enabled = true
pqc_glitch_min_points = 14
pqc_glitch_delta_chi2_thresh = 14.0
pqc_glitch_suppress_overlap = false
pqc_glitch_member_eta = 0.8
pqc_glitch_peak_tau_days = 30.0
pqc_glitch_noise_k = 0.8
pqc_glitch_mean_window_days = 120.0
pqc_glitch_min_duration_days = 200.0
